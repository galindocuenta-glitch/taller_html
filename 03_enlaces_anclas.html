    <!-- Los enlaces o anclas o hipervinculos -->
     <!-- a (anchor)significa ancla.Metafora: como en un barco te mantiene en una ubicacion especifica un ancla es justamente para que el ususario sepa hacia donde buscar un recurso o hacia dónde navegar en la pagina web. -->
      <!-- Los atributos son caracterisiticas que definen el comportamiento y la apariencia de los elementos en este caso el atributo href vuelve funcional a la etiqueta es por esta razón que se utiliza en el maquetado y no en el css dado que no es una característica visual. -->
       <!-- href(hyper reference ) es la referencia a un recurso, es decir, el destino del enlace. -->
        <!-- Lo que esta dentro de la etiqueta a es el texto visible que el usuario verá en la página web. Mientras que lo que esta dentro de href es la referencia al recurso al que apunta el enlace. -->
        <h2 title="Git Hub">https://github.com/galindocuenta-glitch/taller_html</h2>

        <!-- Por otra parte, el atributo title porpociona un texto de ayuda que se muestra cuando el pasa el mouse sobre el enlace. Las tecnologías de asistencia como lectores de pantalla utilizan este atributo para proporcionar información adicional al usuario. En el caso de personas invidentes esto les permite acceder a información adicional sobre el enlace. 
   -->
