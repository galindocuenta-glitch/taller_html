    <!-- Titulo o Encabezado:
     Se tiene 6 tipos de encabezados, desde el h1 hasta el h6. -->

     <!-- (h$*6) Crea 6 titulos en orden del 1 al 6 Emmet -->

     <h1> David te creo</h1>

     <!-- El h1 se utiliza una sola vez por pagina web esto es debido a que el h1 tiene una importancia en el CEO lo que es posicionamiento web,es decir, google le da mucha importancia al h1 -->

     <h2>Eres el mejor</h2>
     <h3>Creo en ti</h3>
     <h4>Eres el dueño de tus logros</h4>
     <h5>Un dia a la vez</h5>
     <h6>Confia en el proceso</h6>

     <!-- Desde el h2 hasta el h6, se puede utilizar las veces que sean necesarias segun el contemido que se quiera recrear -->

    <!--  Parrafó:Los párrafos deben tener una idea.Es decir, puede describir una seccion o un elemento, hasta un mensaje en el chat.Por ejemplo es una seccion se habla sobre los beneficios del ejercicio:
      Un párrafo puede tratar de mejorar la salud cardiovascular y otro puede ser sobre los beneficios y cuidados de la salud mental. Finalmente, debe existir un motivo para que exista un párrafo. -->

      <p>

        El apego evitativo es un estilo de apego inseguro desarrollado desde la infancia, donde se aprende a reprimir emociones y priorizar la autosuficiencia ante cuidadores poco receptivos.
      </p>
